<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hűtő Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="fridge">
        <h1>Termék hozzáadása</h1>
        <form action="/add" method="POST">
            <label for="item_name">Termék:</label>
            <input type="text" id="item_name" name="item_name" required>
            <label for="item_desc">Leírás:</label>
            <input type="text" id="item_desc" name="item_desc" required>
            <label for="item_desc">Felbontva:</label>
            <input type="date" id="item_opened" name="item_opened">
            <label for="item_after_open">Felbontás után fogyasztható (nap):</label>
            <input type="number" id="item_after_open" name="item_after_open" min="0" max="365" required>
            <button type="submit">Hozzáad</button>
        </form>
        <h2>Készlet</h2>
        <div class="post-it-container">
            {% for item in inventory %}
            <div class="post-it 
            {% if item.after_open == 'MA!' %}
                warn-expired
            {% elif item.after_open == 'LEJÁRT!!!' %}
                expired
            {% endif %}">
                <h3>{{ item.name }}</h3>
                <p><strong>{{ item.opened }}</strong></p>
                <p>{{ item.open_date }}</p>
                <p><strong>Leírás:</strong> {{ item.description }}</p>
                <p><strong>Fogyasztható:</strong> {{ item.after_open }}</p>
                <div class="actions">
                    <a class="
                        {% if item.after_open == 'LEJÁRT!!!' %}
                            expired
                        {% endif %}" href="{{ url_for('open_item', item_id=item.id) }}">Open

                        {% if item.opened == 'Felbontva' %}
                            <i class="fa-solid fa-lock-open"></i>
                        {% else %}
                            <i class="fa-solid fa-lock"></i>
                        {% endif %}
                        
                    </a>
                    <a class="
                        {% if item.after_open == 'LEJÁRT!!!' %}
                            expired
                        {% endif %}" href="{{ url_for('delete_item', item_id=item.id) }}">Delete
                        <i class="fa-solid fa-trash"></i>
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
